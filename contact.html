      <section class="contact-page">
    <h2>Let's Start Your Project</h2>
    <p>Tell us about your goals and we'll get back to you with a custom quote.</p>
    
    <form action="https://formspree.io/f/mjgazerz" method="POST" class="quote-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Project Type</label>
            <select>
                <option>Web Design</option>
                <option>SEO Audit</option>
                <option>Smart Invites</option>
            </select>
        </div>
        <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Tell us about your project..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Request</button>
    </form>
